<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380"><style>text{font-family:sans-serif;fill:#172033}.h{font-size:22px;font-weight:bold}.s{font-size:15px}.b{stroke:#276FBF;stroke-width:2;fill:#E8F2FF}.g{stroke:#2D7958;stroke-width:2;fill:#E8F7EF}.r{stroke:#AD4D3A;stroke-width:2;fill:#FCE8E6}</style><text x="30" y="35" class="h">F01 Bounded AI-TCAD workflow</text><rect x="30" y="90" width="200" height="105" rx="10" class="b"/><text x="50" y="125" class="h">Researcher</text><text x="50" y="153" class="s">freeze goals, model bounds, stop rules</text><rect x="280" y="90" width="200" height="105" rx="10" class="b"/><text x="300" y="125" class="h">Codex</text><text x="300" y="153" class="s">headless SSH, bounded attempts</text><rect x="530" y="90" width="200" height="105" rx="10" class="b"/><text x="550" y="125" class="h">TCAD</text><text x="550" y="153" class="s">SDE/SDevice, private artifacts</text><rect x="780" y="90" width="200" height="105" rx="10" class="g"/><text x="800" y="125" class="h">Evidence gates</text><text x="800" y="153" class="s">input, solver, mesh, physics</text><rect x="1030" y="90" width="140" height="105" rx="10" class="r"/><text x="1045" y="125" class="h">Claims</text><text x="1045" y="153" class="s">reviewed</text><path d="M230 142H280 M480 142H530 M730 142H780 M980 142H1030" stroke="#465A78" stroke-width="3"/><text x="40" y="255" class="s">Audit chain: event_id -&gt; attempt_id/run_id -&gt; artifact_id -&gt; SHA -&gt; claim_id</text><text x="40" y="290" class="s">Failed gates preserve negative results; researcher retains approval, interpretation, and responsibility.</text><text x="40" y="330" class="s">Chinese explanatory specification: figures/&#x56FE;&#x4EF6;&#x89C4;&#x683C;.md</text></svg>