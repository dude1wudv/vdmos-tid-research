<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="410"><style>text{font-family:sans-serif;fill:#172033}.h{font-size:21px;font-weight:bold}.s{font-size:15px}.g{fill:#E8F7EF;stroke:#2D7958;stroke-width:2}.r{fill:#FCE8E6;stroke:#AD4D3A;stroke-width:2}.y{fill:#FFF5D6;stroke:#B88500;stroke-width:2}</style><text x="30" y="35" class="h">F05 evidence gates: 7/11 diagnostic and 7/14 production acceptance are separate</text><rect x="50" y="90" width="360" height="65" rx="8" class="g"/><text x="75" y="128" class="h">7/11 input gate: charge 3/3 PASS</text><rect x="50" y="185" width="360" height="65" rx="8" class="g"/><text x="75" y="223" class="h">7/11 solver gate: candidates 0/3 accepted</text><rect x="50" y="280" width="360" height="65" rx="8" class="r"/><text x="75" y="318" class="h">7/11 physics/mesh: INDETERMINATE</text><rect x="740" y="90" width="390" height="65" rx="8" class="g"/><text x="765" y="128" class="h">7/14 DC restart: 8/8 PASS</text><rect x="740" y="185" width="390" height="65" rx="8" class="g"/><text x="765" y="223" class="h">7/14 2.1 ns sidecar: 8/8 PASS</text><rect x="740" y="280" width="390" height="65" rx="8" class="y"/><text x="765" y="318" class="h">fixed model and short-window boundary</text><text x="200" y="385" class="s">Do not use 7/14 production PASS to replace or reverse the 7/11 A01 diagnostic negative result.</text></svg>