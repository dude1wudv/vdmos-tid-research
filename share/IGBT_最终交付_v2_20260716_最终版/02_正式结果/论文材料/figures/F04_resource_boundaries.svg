<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="390"><style>text{font-family:sans-serif;fill:#172033}.h{font-size:21px;font-weight:bold}.s{font-size:15px}.b{fill:#E8F2FF;stroke:#276FBF;stroke-width:2}.y{fill:#FFF5D6;stroke:#B88500;stroke-width:2}</style><text x="30" y="35" class="h">F04 resource lease and execution boundaries (mechanism, not compliance rate)</text><rect x="40" y="90" width="280" height="125" rx="10" class="b"/><text x="65" y="125" class="h">Core policy</text><text x="65" y="155" class="s">reserved core 0; managed slots 4</text><text x="65" y="182" class="s">unmanaged: exclude affinity</text><rect x="430" y="90" width="280" height="125" rx="10" class="y"/><text x="455" y="125" class="h">Run wrapper</text><text x="455" y="155" class="s">isolated dirs, SHA, manifest</text><text x="455" y="182" class="s">lease/affinity provenance fields</text><rect x="820" y="90" width="280" height="125" rx="10" class="b"/><text x="845" y="125" class="h">Remote execution</text><text x="845" y="155" class="s">unique prefix, SDevice, artifacts</text><text x="845" y="182" class="s">single-writer merge</text><path d="M320 152H430 M710 152H820" stroke="#536A8A" stroke-width="3"/><text x="40" y="285" class="s">Public limitation: run_registry has only one legacy row; no complete public lease/affinity ledger exists.</text><text x="40" y="325" class="s">Observed 1/2/4 thread probes are condition-specific and support selection, not a general speedup claim.</text></svg>